<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#111111"/>

  <!-- Subtle radial glow -->
  <circle cx="600" cy="250" r="300" fill="#f59c26" opacity="0.04"/>

  <!-- Cloud outline — smooth, modern, orange wireframe -->
  <g transform="translate(600, 180)" fill="none" stroke="#f59c26" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-70,30 C-70,30 -80,30 -85,25 C-95,15 -95,-5 -80,-15 C-70,-22 -55,-22 -48,-18
             C-42,-35 -25,-48 -5,-48 C18,-48 38,-33 42,-15
             C48,-22 58,-25 68,-22 C85,-17 95,-2 90,15 C88,22 82,28 75,30
             Z" opacity="0.9"/>
    <!-- Inner detail line for depth -->
    <path d="M-60,22 C-60,22 -68,22 -73,18 C-80,10 -80,-2 -68,-10 C-60,-15 -48,-15 -42,-12
             C-37,-26 -22,-36 -5,-36 C15,-36 32,-24 35,-10
             C40,-15 48,-18 56,-15 C70,-11 78,0 75,12 C73,18 68,22 63,22"
          opacity="0.3" stroke-width="2"/>
  </g>

  <!-- Cloud Records -->
  <text x="600" y="340" text-anchor="middle" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="bold" letter-spacing="2">Cloud Records</text>

  <!-- On-Chain Music -->
  <text x="600" y="395" text-anchor="middle" fill="#f59c26" font-family="Georgia, 'Times New Roman', serif" font-size="24" letter-spacing="3">On-Chain Music by Chris Yost</text>

  <!-- Tagline -->
  <text x="600" y="460" text-anchor="middle" fill="#555555" font-family="'Courier New', monospace" font-size="14" letter-spacing="1">100% stored on the Internet Computer</text>

  <!-- Subtle bottom accent line -->
  <line x1="450" y1="500" x2="750" y2="500" stroke="#f59c26" stroke-width="1" opacity="0.3"/>
</svg>
